name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

# Required GitHub secrets:
#   SSH_DEPLOY_KEY  — private key for EC2 SSH
#   DEPLOY_HOST     — EC2 hostname
#   DEPLOY_USER     — EC2 SSH user (e.g. deploy / ubuntu)
#   DATABASE_URL    — Neon Postgres production URL (used by db-migrate job)
#
# Required GitHub vars (Settings → Secrets and variables → Actions → Variables):
#   INFERENCE_BASE_URL    — e.g. http://127.0.0.1:8000 (defaults if unset)
#   INFERENCE_TIMEOUT_MS  — optional; defaults to 10000
#   BUILD_PRIVY_APP_ID    — existing
#
# Tier-2 deploy architecture (2026-05-13):
#   CI builds the Next 15 standalone bundle (`output: 'standalone'` in
#   next.config.ts). The bundle (~80MB tarball) is uploaded as a workflow
#   artifact, downloaded by the deploy job, scp'd to EC2, and run directly
#   via `node server.js` under pm2. EC2 no longer runs `npm install` or
#   `npm run build` on deploys — the only EC2-side work is untar + pm2
#   restart, total ~15s.
#
#   .env.local lives at /home/ubuntu/exira-web-v2/.env.local on EC2 and is
#   sourced by the start-exira-web.sh wrapper before exec'ing node. The
#   wrapper also sources ~/exira-web-runtime.env which the workflow syncs.

jobs:
  build:
    name: Build standalone bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-node20-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build (Next standalone output)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ vars.BUILD_PRIVY_APP_ID || 'buildstubbuildstubbuildst' }}
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          NEXT_PUBLIC_SOLANA_CLUSTER: devnet
          NEXT_PUBLIC_EXIRA_PROGRAM_ID: J7z1a2bwMEC8MchgZwskJZ8PzXg4UG674VgD8DuotJn2
          DATABASE_URL: postgresql://build:stub@localhost:5432/stub

      # Next's standalone output is a self-contained server bundle but does NOT
      # auto-copy /public or /.next/static. Splice them in, then tarball.
      - name: Package standalone deploy artifact
        run: |
          set -euo pipefail
          if [ ! -d .next/standalone ]; then
            echo "::error::.next/standalone missing — is output: 'standalone' set in next.config.ts?"
            exit 1
          fi
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          tar -czf deploy.tgz -C .next/standalone .
          ls -lh deploy.tgz

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-deploy-bundle
          path: deploy.tgz
          retention-days: 7
          if-no-files-found: error

  db-migrate:
    name: Apply DB schema (Drizzle push)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-node20-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Apply schema diff to Neon (drizzle-kit push)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::warning::DATABASE_URL secret is not set — skipping schema push."
            exit 0
          fi
          echo "Running: drizzle-kit push"
          npx drizzle-kit push --force --verbose

  deploy:
    name: Deploy bundle to EC2
    needs: [build, db-migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: web-deploy-bundle

      - name: Sync runtime env file to host
        env:
          INFERENCE_BASE_URL: ${{ vars.INFERENCE_BASE_URL || 'http://127.0.0.1:8000' }}
          INFERENCE_TIMEOUT_MS: ${{ vars.INFERENCE_TIMEOUT_MS || '10000' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "cat > \$HOME/exira-web-runtime.env" <<EOF
          INFERENCE_BASE_URL=${INFERENCE_BASE_URL}
          INFERENCE_TIMEOUT_MS=${INFERENCE_TIMEOUT_MS}
          EOF

      - name: Generate EC2 wrapper script locally
        run: |
          cat > start-exira-web.sh <<'WRAPPER'
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$HOME/exira-web-bundle"
          set -a
          [ -f "$HOME/exira-web-v2/.env.local" ] && . "$HOME/exira-web-v2/.env.local"
          [ -f "$HOME/exira-web-runtime.env" ] && . "$HOME/exira-web-runtime.env"
          set +a
          export PORT="${PORT:-3100}"
          export HOSTNAME="${HOSTNAME:-127.0.0.1}"
          exec node server.js
          WRAPPER
          chmod +x start-exira-web.sh

      - name: Ship bundle + wrapper to EC2
        run: |
          scp -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=accept-new \
              deploy.tgz start-exira-web.sh \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/"

      - name: Untar + start over SSH
        run: |
          # On EC2: atomic-swap bundle into place, install wrapper, ensure
          # pm2 is running the standalone server. First-time migration:
          # delete the old `npm start`-based process and start fresh with
          # the wrapper. Subsequent deploys: pm2 restart (fast path).
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "bash -s" <<'REMOTE'
          set -euo pipefail
          STAGING="$HOME/exira-web-bundle-staging"
          LIVE="$HOME/exira-web-bundle"
          PREV="$HOME/exira-web-bundle-previous"

          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          tar -xzf /tmp/deploy.tgz -C "$STAGING"
          rm /tmp/deploy.tgz

          if [ -d "$LIVE" ]; then
            rm -rf "$PREV"
            mv "$LIVE" "$PREV"
          fi
          mv "$STAGING" "$LIVE"

          mv /tmp/start-exira-web.sh "$HOME/start-exira-web.sh"
          chmod +x "$HOME/start-exira-web.sh"

          # pm2 reconfigure: if exira-web-v2 isn't running the wrapper, delete + start fresh.
          if pm2 describe exira-web-v2 2>/dev/null | grep -q "start-exira-web.sh"; then
            pm2 restart exira-web-v2 --update-env
          else
            echo "Migrating pm2 to standalone wrapper"
            pm2 delete exira-web-v2 2>/dev/null || true
            pm2 start "$HOME/start-exira-web.sh" --name exira-web-v2 --update-env
            pm2 save
          fi

          pm2 list | grep exira-web-v2 || true
          REMOTE

      - name: Smoke test production (web)
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -skS -o /dev/null -w "%{http_code}" --max-time 20 "https://ascertainty.com/" || echo "000")
            echo "attempt $i: HTTPS $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "::error::web smoke test failed — bundle may be broken. Roll back on EC2 via: mv ~/exira-web-bundle-previous ~/exira-web-bundle && pm2 restart exira-web-v2 --update-env"
          exit 1

      - name: Smoke test inference (soft)
        if: ${{ vars.INFERENCE_BASE_URL != '' }}
        run: |
          set +e
          for i in 1 2 3; do
            code=$(curl -skS -o /dev/null -w "%{http_code}" --max-time 10 "${{ vars.INFERENCE_BASE_URL }}/health" || echo "000")
            echo "inference health attempt $i: $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "::warning::Inference service at ${{ vars.INFERENCE_BASE_URL }} is not responding. PINN-dependent routes (/auditor/intake, /lender/[deal_id]) will 502 until it returns."
